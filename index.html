<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>胰島素補打計算</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0; padding: 10px;
  background: #f0f2f5; color: #333;
}
h1 { text-align: center; margin-bottom: 5px; color: #0275d8; }
.instruction {
  background: #e7f3ff;
  border: 1px solid #b2d4ff;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 20px;
  font-size: 0.95rem;
  line-height: 1.5;
  color: #0056b3;
}
.section {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
h2 { margin-top: 0; color: #555; font-size: 1.2rem; }
label { display: block; margin-top: 12px; font-weight: bold; }
input, select { width: 100%; padding: 12px; margin-top: 5px; font-size: 1rem; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }

input.invalid { border: 2px solid #d9534f; color: #d9534f; background-color: #fff5f5; }

.input-group { display: flex; gap: 8px; align-items: flex-end; }
.input-group input { flex: 1; }
.paste-btn { 
  background: #6c757d; 
  padding: 12px; 
  width: auto; 
  margin-top: 5px; 
  font-size: 0.95rem;
  color: white;
  border: none;
  border-radius: 6px;
  white-space: nowrap;
  cursor: pointer;
}

.result { 
  margin-top: 15px; 
  font-weight: bold; 
  font-size: 1.2rem; 
  color: #d9534f; 
  line-height: 1.8; 
  padding-top: 10px;
  border-top: 2px dashed #eee;
}
.tip { font-size: 0.85rem; color: #666; margin-top: 5px; }
.disclaimer { font-size: 0.75rem; color: #999; text-align: center; margin-top: 20px; }

.toast {
  visibility: hidden; min-width: 200px;
  background-color: rgba(0,0,0,0.85); color: #fff;
  text-align: center; border-radius: 6px; padding: 12px;
  position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%);
  font-size: 1rem;
}
.toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
@keyframes fadein { from {bottom: 20px; opacity: 0;} to {bottom: 30px; opacity:1;} }
@keyframes fadeout { from {bottom: 30px; opacity:1;} to {bottom: 20px; opacity:0;} }

.link-button {
  background: #6c757d;
  display: block;
  text-align: center;
  text-decoration: none;
  color: white;
  margin-top: 15px;
  padding: 12px;
  border-radius: 6px;
  transition: 0.3s;
}
</style>
</head>
<body>

<h1>胰島素補打計算</h1>

<div class="instruction">
  💡 <b>使用說明：</b><br>
  1. 若已知確定的 <b>ISF</b> 與 <b>ICR</b>，可跳過第一部分。<br>
  2. 若不確定，請輸入每日總劑量 (TDD) 進行估算。
</div>

<div id="toast" class="toast">數值已更新</div>

<div class="section" style="border-left:5px solid #0275d8;">
  <h2>一、估算係數</h2>
  <label>法則選擇：
  <select id="ruleSelect">
    <option value="1800/500">速效 (1800 / 500)</option>
    <option value="1500/450">短效 (1500 / 450)</option>
  </select>
  </label>
  <label>每日總胰島素 (TDD)：</label>
  <input type="number" id="tdd" inputmode="decimal" placeholder="請輸入每日總劑量">
</div>

<div class="section" style="border-left:5px solid #5cb85c;">
  <h2>二、確認或輸入 ISF / ICR</h2>
  <label>ISF 胰島素敏感因子：</label>
  <input type="number" id="isfInput" inputmode="decimal" placeholder="例如：40">
  <p class="tip">每 1 U 可降低的血糖值 (mg/dL)</p>
  
  <label>ICR 胰島素與碳水比值：</label>
  <input type="number" id="icrInput" inputmode="decimal" placeholder="例如：10">
  <p class="tip">每 1 U 可處理的碳水克數 (g)</p>
</div>

<div class="section" style="border-left:5px solid #f0ad4e;">
  <h2>三、補打速效胰島素</h2>
  <label>目前血糖：</label>
  <input type="number" id="currentBg" inputmode="numeric" placeholder="請測量血糖">
  
  <label>目標血糖：</label>
  <input type="number" id="targetBg" value="150" inputmode="numeric">
  <p class="tip">建議範圍：100 - 180 mg/dL</p>
  
  <label>餐點碳水量 (公克)：</label>
  <div class="input-group">
    <input type="number" id="carbs" inputmode="decimal" placeholder="請輸入或貼上">
    <button class="paste-btn" onclick="pasteCarbs()">📋 貼上</button>
  </div>

  <div class="result" id="doseResult">
    修正劑量：-- U<br>
    餐點劑量：-- U<br>
    建議補打：-- U
  </div>
</div>

<div class="section" style="border-left:5px solid #6c757d;">
  <h2>四、實用工具連結</h2>
  <a href="https://adsccxx-cpu.github.io/CHO_calculate.html/" target="_blank" class="link-button">前往：碳水化合物計算機</a>
</div>

<div class="disclaimer">
  *本工具僅供參考，調整劑量前請諮詢專業醫療人員。<br>
  © 臨床營養與糖尿病衛教工具
</div>

<script>
function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = "toast show";
  setTimeout(()=>{toast.className = toast.className.replace("show","");}, 2500);
}

async function pasteCarbs() {
  try {
    const text = await navigator.clipboard.readText();
    const num = parseFloat(text);
    if (!isNaN(num)) {
      document.getElementById("carbs").value = num;
      showToast("已貼上碳水量：" + num + "g");
      updateDose();
    }
  } catch (err) {
    alert("無法讀取剪貼簿，請手動輸入。");
  }
}

function autoCalculateFactors() {
  const tdd = parseFloat(document.getElementById("tdd").value);
  const rule = document.getElementById("ruleSelect").value;
  if (tdd > 0) {
    let isf = (rule === "1800/500") ? Math.floor(1800/tdd) : Math.floor(1500/tdd);
    let icr = (rule === "1800/500") ? Math.floor(500/tdd) : Math.floor(450/tdd);
    document.getElementById("isfInput").value = isf;
    document.getElementById("icrInput").value = icr;
    showToast("係數已更新");
  }
  updateDose();
}

function updateDose(){
  const isf = parseFloat(document.getElementById("isfInput").value);
  const icr = parseFloat(document.getElementById("icrInput").value);
  const current = parseFloat(document.getElementById("currentBg").value);
  const target = parseFloat(document.getElementById("targetBg").value);
  const carbs = parseFloat(document.getElementById("carbs").value);
  const bgInput = document.getElementById("currentBg");
  const resultDiv = document.getElementById("doseResult");

  if (current > 600 || (current < 40 && current > 0)) {
    bgInput.classList.add("invalid");
  } else {
    bgInput.classList.remove("invalid");
  }

  if(!isf || !icr || isNaN(current) || isNaN(target)){ 
    resultDiv.innerHTML = "修正劑量：-- U<br>餐點劑量：-- U<br>建議補打：-- U"; 
    return;
  }

  let meal = !isNaN(carbs) ? carbs/icr : 0;
  
  if(current < 71){
    resultDiv.innerHTML = "⚠ 低血糖危險！請立刻補充15克糖，不可補打！";
    return;
  }
  if(current > 599){
    resultDiv.innerHTML = "⚠ 血糖過高(HI)，請立即就醫！";
    return;
  }
  
  // 當血糖低於目標值時的提示
  if(current < target){
    let extraTip = (current < 100) ? "（血糖偏低）" : "（目前血糖低於目標，不需修正）";
    let finalMealDose = (current < 100) ? (meal * 0.5) : meal;
    
    resultDiv.innerHTML = `
      <span style="color:#28a745;">修正劑量：0 U ${extraTip}</span><br>
      餐點劑量：${meal.toFixed(1)} U<br>
      建議補打：${(current < 100 ? finalMealDose.toFixed(1) : Math.floor(meal))} U
    `;
    return;
  }

  let correction = (current - target) / isf;
  let total = Math.floor(correction + meal);

  resultDiv.innerHTML = 
    `修正劑量：${correction.toFixed(1)} U<br>
     餐點劑量：${meal.toFixed(1)} U<br>
     建議補打：${total} U`; 
}

document.getElementById("targetBg").addEventListener("change", function() {
  let val = parseFloat(this.value);
  if (val < 100) this.value = 100;
  if (val > 180) this.value = 180;
  updateDose();
});

document.getElementById("tdd").addEventListener("input", autoCalculateFactors);
document.getElementById("ruleSelect").addEventListener("change", autoCalculateFactors);
["isfInput", "icrInput", "currentBg", "targetBg", "carbs"].forEach(id => {
  document.getElementById(id).addEventListener("input", updateDose);
});
</script>
</body>
</html>
